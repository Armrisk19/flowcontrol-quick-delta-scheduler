name: FLOWCONTROL Top-20 Market Mastery Scheduler v2.2.0

on:
  schedule:
    - cron: "2-59/5 * * * *"

  workflow_dispatch:
    inputs:
      perform_openai_live_check:
        description: Run the optional OpenAI live acceptance check
        required: false
        default: false
        type: boolean

      force_universe_refresh:
        description: Force a new live top-20 selection
        required: false
        default: true
        type: boolean

      force_board_refresh:
        description: Force a new 120-plan board
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - uses: actions/checkout@v5

      - name: Refresh and verify FLOWCONTROL
        shell: bash

        env:
          FLOWCONTROL_GATEWAY_BASE_URL: ${{ secrets.FLOWCONTROL_GATEWAY_BASE_URL }}
          OMNI_COGNITIVE_GATEWAY_TOKEN: ${{ secrets.OMNI_COGNITIVE_GATEWAY_TOKEN }}
          PERFORM_OPENAI_LIVE_CHECK: ${{ inputs.perform_openai_live_check || 'false' }}
          FORCE_UNIVERSE_REFRESH: ${{ inputs.force_universe_refresh || 'false' }}
          FORCE_BOARD_REFRESH: ${{ inputs.force_board_refresh || 'true' }}

        run: |
          set -euo pipefail

          BASE="${FLOWCONTROL_GATEWAY_BASE_URL%/}"
          AUTH="Authorization: Bearer ${OMNI_COGNITIVE_GATEWAY_TOKEN}"

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          request() {
            local label="$1"
            local method="$2"
            local url="$3"
            local body="${4:-}"
            local output="$5"
            local code=""

            for attempt in 1 2 3 4; do
              echo "FLOWCONTROL request: $label attempt $attempt/4"

              if [[ "$method" == "POST" ]]; then
                code=$(
                  curl \
                    -sS \
                    --max-time 110 \
                    -o "$output" \
                    -w '%{http_code}' \
                    -X POST \
                    -H "$AUTH" \
                    -H 'Content-Type: application/json' \
                    --data "$body" \
                    "$url" || true
                )
              else
                local sep='?'

                if [[ "$url" == *'?'* ]]; then
                  sep='&'
                fi

                code=$(
                  curl \
                    -sS \
                    --max-time 60 \
                    -o "$output" \
                    -w '%{http_code}' \
                    "${url}${sep}cb=$(date +%s%N)" || true
                )
              fi

              if [[ "$code" =~ ^2 ]]; then
                echo "FLOWCONTROL request PASS: $label HTTP $code"
                return 0
              fi

              echo "FLOWCONTROL request retry: $label HTTP $code"
              cat "$output" || true
              sleep $((attempt * 3))
            done

            echo "FLOWCONTROL request FAILED: $label"
            return 1
          }

          UNIVERSE_BODY=$(
            printf \
              '{"reason":"scheduler_v2_2_0","force":%s}' \
              "$FORCE_UNIVERSE_REFRESH"
          )

          request \
            "active top-20 universe refresh" \
            POST \
            "$BASE/api/active-universe-refresh" \
            "$UNIVERSE_BODY" \
            "$tmp/universe-refresh.json"

          request \
            "opportunity queue refresh" \
            POST \
            "$BASE/api/opportunity-queue" \
            '{"refresh":true,"reason":"scheduler_v2_2_0"}' \
            "$tmp/opportunity-refresh.json"

          request \
            "quick delta refresh" \
            POST \
            "$BASE/api/quick-delta-refresh" \
            '{"reason":"scheduler_v2_2_0"}' \
            "$tmp/quick-refresh.json"

          request \
            "official source refresh" \
            POST \
            "$BASE/api/official-source-refresh" \
            '{"reason":"scheduler_v2_2_0"}' \
            "$tmp/official-refresh.json"

          request \
            "macro event refresh" \
            POST \
            "$BASE/api/macro-event-refresh" \
            '{"reason":"scheduler_v2_2_0"}' \
            "$tmp/macro-refresh.json"

          BOARD_BODY=$(
            printf \
              '{"reason":"scheduler_v2_2_0","force":%s}' \
              "$FORCE_BOARD_REFRESH"
          )

          request \
            "automatic 120-plan board refresh" \
            POST \
            "$BASE/api/autonomous-board-refresh" \
            "$BOARD_BODY" \
            "$tmp/board-refresh.json"

          request \
            "health" \
            GET \
            "$BASE/api/health" \
            '' \
            "$tmp/health.json"

          request \
            "manifest" \
            GET \
            "$BASE/api/release-manifest" \
            '' \
            "$tmp/manifest.json"

          request \
            "readiness" \
            GET \
            "$BASE/api/readiness" \
            '' \
            "$tmp/readiness.json"

          request \
            "active universe status" \
            GET \
            "$BASE/api/active-universe-status" \
            '' \
            "$tmp/universe.json"

          request \
            "board status" \
            GET \
            "$BASE/api/autonomous-board-status" \
            '' \
            "$tmp/board.json"

          request \
            "quick status" \
            GET \
            "$BASE/api/quick-delta-refresh" \
            '' \
            "$tmp/quick.json"

          request \
            "opportunity status" \
            GET \
            "$BASE/api/opportunity-queue" \
            '' \
            "$tmp/opportunity.json"

          if [[ "$PERFORM_OPENAI_LIVE_CHECK" == "true" ]]; then
            request \
              "OpenAI live acceptance check" \
              POST \
              "$BASE/api/omni-runtime-diagnostic" \
              '{"mode":"LIVE_ACCEPTANCE","reason":"scheduler_v2_2_0"}' \
              "$tmp/live.json"
          else
            printf '%s' '{"skipped":true}' > "$tmp/live.json"
          fi

          node - "$tmp" <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const dir = process.argv[2];

          const read = (name) =>
            JSON.parse(
              fs.readFileSync(
                path.join(dir, name),
                "utf8"
              )
            );

          const health = read("health.json");
          const manifest = read("manifest.json");
          const readiness = read("readiness.json");
          const universe = read("universe.json");
          const board = read("board.json");
          const quick = read("quick.json");
          const opportunity = read("opportunity.json");
          const live = read("live.json");

          const expected = JSON.parse(
            fs.readFileSync(
              "EXPECTED_RELEASE.json",
              "utf8"
            )
          );

          const fail = (label, data) => {
            console.error(
              `FLOWCONTROL scheduler verification FAILED: ${label}`
            );

            console.error(
              JSON.stringify(data, null, 2)
            );

            process.exit(1);
          };

          const sorted = (values) =>
            [...(values || [])].sort();

          const sameSet = (left, right) =>
            JSON.stringify(sorted(left)) ===
            JSON.stringify(sorted(right));

          if (
            health.gateway_version !==
              expected.gateway_version ||
            health.strategy_contract_version !==
              expected.strategy_contract_version
          ) {
            fail("release version", {
              health,
              expected
            });
          }

          if (
            manifest.active_universe_contract?.version !==
            expected.active_universe_contract_version
          ) {
            fail("active universe contract", {
              manifest:
                manifest.active_universe_contract,
              expected
            });
          }

          if (
            manifest.market_mastery_contract?.version !==
            expected.market_mastery_contract_version
          ) {
            fail("market mastery contract", {
              manifest:
                manifest.market_mastery_contract,
              expected
            });
          }

          if (
            !sameSet(
              manifest.eligible_markets,
              expected.eligible_markets
            )
          ) {
            fail("eligible market pool", {
              actual: manifest.eligible_markets,
              expected: expected.eligible_markets
            });
          }

          if (
            !sameSet(
              manifest.core_markets,
              expected.core_markets
            )
          ) {
            fail("core anchors", {
              actual: manifest.core_markets,
              expected: expected.core_markets
            });
          }

          if (
            universe.ok !== true ||
            universe.audit?.ok !== true ||
            Number(universe.active_count) !== 20
          ) {
            fail("active top twenty", {
              universe
            });
          }

          const counts =
            universe.audit?.class_counts || {};

          for (
            const [key, value]
            of Object.entries(
              expected.active_class_targets || {}
            )
          ) {
            if (
              Number(counts[key] || 0) !==
              Number(value)
            ) {
              fail("active class balance", {
                counts,
                expected:
                  expected.active_class_targets
              });
            }
          }

          if (
            Number(universe.age_sec) >
            expected.active_universe_max_age_sec
          ) {
            fail("active universe age", {
              universe
            });
          }

          if (
            !sameSet(
              manifest.declared_markets,
              universe.active_markets
            )
          ) {
            fail("manifest active universe", {
              manifest:
                manifest.declared_markets,
              universe:
                universe.active_markets
            });
          }

          if (
            readiness.internal_contract_sync !== true ||
            (readiness.critical_blockers || []).length
          ) {
            fail("readiness", {
              readiness
            });
          }

          if (
            health.active_universe_self_test
              ?.all_passed !== true
          ) {
            fail("universe selector self test", {
              test:
                health.active_universe_self_test
            });
          }

          if (
            health.market_mastery_self_test
              ?.all_passed !== true
          ) {
            fail("market mastery self test", {
              test:
                health.market_mastery_self_test
            });
          }

          if (
            health.autonomous_board_self_test
              ?.complete !== true
          ) {
            fail("board self test", {
              test:
                health.autonomous_board_self_test
            });
          }

          if (
            health.adaptive_entry_self_test
              ?.all_passed !== true
          ) {
            fail("adaptive entry self test", {
              test:
                health.adaptive_entry_self_test
            });
          }

          if (
            health.adaptive_bracket_self_test
              ?.all_passed !== true
          ) {
            fail("adaptive bracket self test", {
              test:
                health.adaptive_bracket_self_test
            });
          }

          if (
            board.board_complete !== true ||
            Number(
              board.exact_scored_plan_count
            ) !== 120 ||
            Number(
              board.unscored_plan_count
            ) !== 0 ||
            Number(
              board.active_market_count
            ) !== 20
          ) {
            fail("exact board", {
              board
            });
          }

          if (
            (board.missing_plan_keys || []).length ||
            (board.duplicate_plan_keys || []).length ||
            (board.unexpected_plan_keys || []).length
          ) {
            fail("board keys", {
              board
            });
          }

          if (
            board.universe_match !== true ||
            board.universe_fingerprint !==
              universe.universe_fingerprint
          ) {
            fail("board universe fingerprint", {
              board,
              universe
            });
          }

          if (
            Number(board.age_sec) >
            expected.autonomous_board_max_age_sec
          ) {
            fail("board age", {
              board
            });
          }

          if (
            Number(quick.market_count) !== 20 ||
            Number(quick.age_sec) >
              expected.quick_delta_max_age_sec
          ) {
            fail("quick delta", {
              quick
            });
          }

          if (
            Number(opportunity.market_count) !== 20 ||
            Number(opportunity.age_sec) >
              expected.opportunity_queue_max_age_sec
          ) {
            fail("opportunity queue", {
              opportunity
            });
          }

          const missing =
            (
              expected.required_capabilities || []
            ).filter(
              (value) =>
                !(
                  manifest.capabilities || []
                ).includes(value)
            );

          if (missing.length) {
            fail("capabilities", {
              missing
            });
          }

          const liveCheckRan =
            live.skipped !== true;

          const liveVerified =
            liveCheckRan &&
            live.ok === true &&
            live.status === "READY" &&
            live.internal_contract_sync === true &&
            live.gateway_version ===
              expected.gateway_version &&
            live.strategy_contract_version ===
              expected.strategy_contract_version;

          if (
            liveCheckRan &&
            liveVerified !== true
          ) {
            fail("OpenAI live acceptance", {
              live,
              expected: {
                gateway_version:
                  expected.gateway_version,
                strategy_contract_version:
                  expected.strategy_contract_version,
                status: "READY",
                internal_contract_sync: true
              }
            });
          }

          console.log(
            JSON.stringify(
              {
                result:
                  "FLOWCONTROL scheduler verification PASS",

                scheduler_version:
                  expected.scheduler_version,

                gateway_version:
                  health.gateway_version,

                strategy_contract_version:
                  health.strategy_contract_version,

                active_universe_contract_version:
                  manifest.active_universe_contract
                    ?.version,

                market_mastery_contract_version:
                  manifest.market_mastery_contract
                    ?.version,

                active_universe_id:
                  universe.universe_id,

                active_universe_fingerprint:
                  universe.universe_fingerprint,

                selected_markets:
                  universe.active_markets,

                active_class_counts:
                  counts,

                universe_age_sec:
                  universe.age_sec,

                board_ledger_id:
                  board.ledger_id,

                board_ledger_hash:
                  board.ledger_hash,

                board_age_sec:
                  board.age_sec,

                exact_scored_plan_count:
                  board.exact_scored_plan_count,

                actionable_count:
                  board.actionable_count,

                adaptive_entry_self_test_passed:
                  health.adaptive_entry_self_test
                    ?.passed_count,

                adaptive_bracket_self_test_passed:
                  health.adaptive_bracket_self_test
                    ?.passed_count,

                openai_live_check_ran:
                  liveCheckRan,

                openai_live_verified:
                  liveVerified
              },
              null,
              2
            )
          );
          NODE
