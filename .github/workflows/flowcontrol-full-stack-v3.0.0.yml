name: FLOWCONTROL Full-Stack Verification Scheduler v3.0.0

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      perform_openai_live_check:
        description: Run authenticated live acceptance diagnostic
        required: false
        default: false
        type: boolean
      force_board_refresh:
        description: Force the 60-cell Directional Opportunity Mesh refresh
        required: false
        default: true
        type: boolean
      force_slow_source_refresh:
        description: Refresh official and macro sources now
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: flowcontrol-full-stack-v3-0-0
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GATEWAY_BASE_URL: ${{ secrets.FLOWCONTROL_GATEWAY_BASE_URL || 'https://flowcontrol-omni-x-gateway-a29-c84d.vercel.app' }}
  GATEWAY_TOKEN: ${{ secrets.OMNI_COGNITIVE_GATEWAY_TOKEN }}

jobs:
  refresh-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout verification contract
        uses: actions/checkout@v5

      - name: Refresh opportunity intelligence and verify release
        shell: bash
        env:
          INPUT_OPENAI: ${{ github.event.inputs.perform_openai_live_check }}
          INPUT_FORCE_BOARD: ${{ github.event.inputs.force_board_refresh }}
          INPUT_SLOW_REFRESH: ${{ github.event.inputs.force_slow_source_refresh }}
        run: |
          set -euo pipefail
          test -n "${GATEWAY_TOKEN:-}" || { echo "Missing OMNI_COGNITIVE_GATEWAY_TOKEN secret"; exit 1; }
          BASE="${GATEWAY_BASE_URL%/}"
          AUTH="Authorization: Bearer ${GATEWAY_TOKEN}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          request() {
            local label="$1" method="$2" url="$3" body="$4" output="$5" code=""
            for attempt in 1 2 3 4; do
              echo "FLOWCONTROL request: $label attempt $attempt/4"
              if [[ "$method" == "POST" ]]; then
                code=$(curl -sS --max-time 120 -o "$output" -w '%{http_code}' -X POST -H "$AUTH" -H 'Content-Type: application/json' --data "$body" "$url" || true)
              else
                code=$(curl -sS --max-time 60 -o "$output" -w '%{http_code}' "$url?cb=$(date +%s%N)" || true)
              fi
              if [[ "$code" =~ ^2 ]]; then echo "FLOWCONTROL request PASS: $label HTTP $code"; return 0; fi
              echo "FLOWCONTROL request retry: $label HTTP $code"
              cat "$output" || true
              sleep $((attempt*3))
            done
            echo "FLOWCONTROL request FAILED: $label"
            return 1
          }

          PERFORM_OPENAI_LIVE_CHECK="${INPUT_OPENAI:-false}"
          FORCE_BOARD_REFRESH="${INPUT_FORCE_BOARD:-true}"
          FORCE_SLOW_REFRESH="${INPUT_SLOW_REFRESH:-false}"
          minute="$(date -u +%M)"
          hour="$(date -u +%H)"
          if [[ "$minute" == "00" || "$FORCE_SLOW_REFRESH" == "true" ]]; then
            request "macro event refresh" POST "$BASE/api/macro-event-refresh" '{"reason":"scheduler_v3_0_0"}' "$tmp/macro-refresh.json"
          fi
          if [[ ( "$minute" == "00" && $((10#$hour % 6)) -eq 0 ) || "$FORCE_SLOW_REFRESH" == "true" ]]; then
            request "official source refresh" POST "$BASE/api/official-source-refresh" '{"reason":"scheduler_v3_0_0"}' "$tmp/official-refresh.json"
          fi

          request "opportunity queue refresh" POST "$BASE/api/opportunity-queue" '{"refresh":true,"reason":"scheduler_v3_0_0"}' "$tmp/opportunity-refresh.json"
          request "quick delta refresh" POST "$BASE/api/quick-delta-refresh" '{"reason":"scheduler_v3_0_0"}' "$tmp/quick-refresh.json"
          request "automatic 60-cell opportunity mesh refresh" POST "$BASE/api/autonomous-board-refresh" "{\"reason\":\"scheduler_v3_0_0\",\"force\":${FORCE_BOARD_REFRESH}}" "$tmp/board-refresh.json"

          request "health" GET "$BASE/api/health" '' "$tmp/health.json"
          request "manifest" GET "$BASE/api/release-manifest" '' "$tmp/manifest.json"
          request "readiness" GET "$BASE/api/readiness" '' "$tmp/readiness.json"
          request "active universe" GET "$BASE/api/active-universe-status" '' "$tmp/universe.json"
          request "board status" GET "$BASE/api/autonomous-board-status" '' "$tmp/board.json"
          request "multi-timeframe status" GET "$BASE/api/multi-timeframe-status" '' "$tmp/mtf.json"
          request "breadth status" GET "$BASE/api/breadth-regime-status" '' "$tmp/breadth.json"
          request "quick status" GET "$BASE/api/quick-delta-refresh" '' "$tmp/quick.json"
          request "opportunity status" GET "$BASE/api/opportunity-queue" '' "$tmp/opportunity.json"

          if [[ "$PERFORM_OPENAI_LIVE_CHECK" == "true" ]]; then
            request "OpenAI live acceptance check" POST "$BASE/api/omni-runtime-diagnostic" '{"mode":"LIVE_ACCEPTANCE","reason":"scheduler_v3_0_0"}' "$tmp/live.json"
          else
            printf '%s' '{"skipped":true}' > "$tmp/live.json"
          fi

          node - "$tmp" <<'NODE'
          const fs=require('fs'),path=require('path'),dir=process.argv[2];
          const read=name=>JSON.parse(fs.readFileSync(path.join(dir,name),'utf8'));
          const expected=JSON.parse(fs.readFileSync('EXPECTED_RELEASE.json','utf8'));
          const health=read('health.json'),manifest=read('manifest.json'),readiness=read('readiness.json');
          const universe=read('universe.json'),board=read('board.json'),mtf=read('mtf.json'),breadth=read('breadth.json');
          const quick=read('quick.json'),opportunity=read('opportunity.json'),live=read('live.json');
          const fail=(label,data)=>{console.error(`FLOWCONTROL scheduler verification FAILED: ${label}`);console.error(JSON.stringify(data,null,2));process.exit(1);};
          const same=(a,b)=>JSON.stringify(a)===JSON.stringify(b);

          if(health.gateway_version!==expected.gateway_version||health.strategy_contract_version!==expected.strategy_contract_version||health.scheduler_contract_version!==expected.scheduler_version)fail('release versions',{health,expected});
          if(manifest.gateway_version!==expected.gateway_version||manifest.strategy_contract_version!==expected.strategy_contract_version||manifest.scheduler_contract_version!==expected.scheduler_version)fail('manifest versions',{manifest,expected});
          if(!same(manifest.declared_markets,expected.declared_markets))fail('declared universe',{actual:manifest.declared_markets,expected:expected.declared_markets});
          if(universe.ok!==true||Number(universe.active_count)!==20||universe.audit?.ok!==true)fail('active universe',{universe});
          if(readiness.internal_contract_sync!==true||(readiness.critical_blockers||[]).length)fail('readiness',{readiness});
          if((readiness.degraded_components||[]).length)console.warn('FLOWCONTROL readiness degraded with Engine-native fallback:',readiness.degraded_components);
          if(health.multi_timeframe_self_test?.all_passed!==true||mtf.self_test?.all_passed!==true)fail('multi-timeframe self test',{health:health.multi_timeframe_self_test,mtf});
          if(health.breadth_regime_self_test?.all_passed!==true||breadth.self_test?.all_passed!==true)fail('breadth self test',{health:health.breadth_regime_self_test,breadth});
          if(health.opportunity_capture_self_test?.all_passed!==true)fail('opportunity capture self test',{test:health.opportunity_capture_self_test});
          if(health.net_green_controller_self_test?.all_passed!==true)fail('net-green controller self test',{net_green:health.net_green_controller_self_test});
          if(board.board_complete!==true||Number(board.exact_scored_cell_count??board.exact_scored_plan_count)!==60||Number(board.unscored_cell_count??board.unscored_plan_count)!==0)fail('exact opportunity mesh',{board});
          if((board.missing_plan_keys||[]).length||(board.duplicate_plan_keys||[]).length||(board.unexpected_plan_keys||[]).length)fail('board keys',{board});
          if(Number(board.opposing_actionable_pair_count)!==0)fail('opposing actionable directions',{board});
          if(Number(board.selected_direction_count)>60)fail('selected direction ceiling',{board});
          if(Number(board.multi_timeframe_complete_count)<16)console.warn('FLOWCONTROL Gateway MTF coverage degraded; Engine-native market analysis remains active',board.multi_timeframe_complete_count);
          if(Number(board.age_sec)>expected.autonomous_board_max_age_sec)fail('board age',{board});
          const required=(expected.required_capabilities||[]).filter(value=>!(manifest.capabilities||[]).includes(value));
          if(required.length)fail('required capabilities',{missing:required});
          const openaiLiveVerified=live.live_response_verified===true;
          if(live.skipped!==true&&!openaiLiveVerified)console.warn('FLOWCONTROL optional OpenAI live acceptance degraded; core refresh remains valid');
          console.log(JSON.stringify({result:'FLOWCONTROL scheduler verification PASS',scheduler_version:expected.scheduler_version,gateway_version:health.gateway_version,strategy_contract_version:health.strategy_contract_version,active_count:universe.active_count,exact_scored_cell_count:board.exact_scored_cell_count??board.exact_scored_plan_count,unscored_plan_count:board.unscored_plan_count,actionable_count:board.actionable_count,selected_direction_count:board.selected_direction_count,opposing_actionable_pair_count:board.opposing_actionable_pair_count,multi_timeframe_complete_count:board.multi_timeframe_complete_count,board_age_sec:board.age_sec,quick_age_sec:quick.age_sec??null,opportunity_age_sec:opportunity.age_sec??null,openai_live_verified:openaiLiveVerified},null,2));
          NODE
