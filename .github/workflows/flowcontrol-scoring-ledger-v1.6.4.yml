name: FLOWCONTROL Exact Scoring Scheduler v1.6.4

on:
  schedule:
    - cron: "2-57/5 * * * *"
  workflow_dispatch:
    inputs:
      perform_openai_live_check:
        description: "Perform one real OpenAI Responses API acceptance check"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: flowcontrol-full-capacity-production
  cancel-in-progress: false

jobs:
  refresh-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FLOWCONTROL_GATEWAY_URL: ${{ secrets.FLOWCONTROL_GATEWAY_URL }}
      FLOWCONTROL_GATEWAY_TOKEN: ${{ secrets.FLOWCONTROL_GATEWAY_TOKEN }}
      PERFORM_OPENAI_LIVE_CHECK: ${{ inputs.perform_openai_live_check || false }}
    steps:
      - name: Check out scheduler contract
        uses: actions/checkout@v4

      - name: Refresh intelligence and verify release
        shell: bash
        run: |
          set -euo pipefail
          test -n "${FLOWCONTROL_GATEWAY_URL:-}"
          test -n "${FLOWCONTROL_GATEWAY_TOKEN:-}"
          BASE_URL="${FLOWCONTROL_GATEWAY_URL%/}"
          mkdir -p .flowcontrol

          request_json() {
            local name="$1"
            local method="$2"
            local path="$3"
            local output="$4"
            local max_time="$5"
            local accepted_codes="$6"
            local auth_mode="${7:-PUBLIC}"
            local body="${8:-}"
            local attempt code delay tmp
            tmp="${output}.tmp"

            for attempt in 1 2 3 4; do
              echo "FLOWCONTROL request: ${name} attempt ${attempt}/4"
              args=(
                -sSL
                --connect-timeout 15
                --max-time "${max_time}"
                -o "${tmp}"
                -w "%{http_code}"
                -X "${method}"
                "${BASE_URL}${path}"
              )

              if [ "${auth_mode}" = "AUTH" ]; then
                args+=(-H "Authorization: Bearer ${FLOWCONTROL_GATEWAY_TOKEN}")
              fi

              if [ -n "${body}" ]; then
                args+=(-H "Content-Type: application/json" --data "${body}")
              fi

              code="$(curl "${args[@]}" || true)"

              for accepted in ${accepted_codes}; do
                if [ "${code}" = "${accepted}" ]; then
                  mv "${tmp}" "${output}"
                  echo "FLOWCONTROL request PASS: ${name} HTTP ${code}"
                  return 0
                fi
              done

              echo "FLOWCONTROL request retry: ${name} HTTP ${code:-CURL_ERROR}" >&2
              if [ -s "${tmp}" ]; then
                echo "Response body for ${name}:" >&2
                head -c 2000 "${tmp}" >&2 || true
                echo >&2
              fi

              delay=$((attempt * 5))
              sleep "${delay}"
            done

            echo "FLOWCONTROL request FAILED after retries: ${name}" >&2
            return 1
          }

          request_json \
            "opportunity status before refresh" \
            "GET" \
            "/api/opportunity-queue?action=STATUS" \
            ".flowcontrol/opportunity-before.json" \
            "45" \
            "200"

          opportunity_age="$(node -e "const x=require('./.flowcontrol/opportunity-before.json'); console.log(Number(x.age_sec ?? -1))")"
          if [ "$opportunity_age" -lt 0 ] || [ "$opportunity_age" -gt 600 ]; then
            request_json \
              "opportunity queue refresh" \
              "POST" \
              "/api/opportunity-queue" \
              ".flowcontrol/opportunity-refresh.json" \
              "240" \
              "200 409" \
              "AUTH" \
              '{"action":"REFRESH","reason":"github_scheduler_v1.6.4"}'
          fi

          request_json \
            "quick delta refresh" \
            "POST" \
            "/api/quick-delta-refresh" \
            ".flowcontrol/quick-refresh.json" \
            "210" \
            "200 409" \
            "AUTH" \
            '{"action":"REFRESH","reason":"github_scheduler_v1.6.4"}'

          request_json \
            "official source status before refresh" \
            "GET" \
            "/api/official-source-status" \
            ".flowcontrol/official-status-before.json" \
            "45" \
            "200"

          official_age="$(node -e "const x=require('./.flowcontrol/official-status-before.json'); console.log(Number(x.direct?.refresh_age_sec ?? -1))")"
          if [ "$official_age" -lt 0 ] || [ "$official_age" -gt 1800 ]; then
            request_json \
              "official source refresh" \
              "POST" \
              "/api/official-source-refresh" \
              ".flowcontrol/official-refresh.json" \
              "240" \
              "200 409" \
              "AUTH" \
              '{"include_search":false,"reason":"github_scheduler_v1.6.4_direct"}'
          fi

          # Macro refresh is advisory. A temporary upstream 502 does not block
          # release verification when the cached macro status remains healthy.
          if ! request_json \
            "macro event refresh" \
            "GET" \
            "/api/macro-event-refresh" \
            ".flowcontrol/macro-refresh.json" \
            "240" \
            "200"; then
            printf '%s\n' '{"ok":false,"refresh_deferred":true,"reason":"temporary_gateway_or_upstream_failure"}' > .flowcontrol/macro-refresh.json
            echo "FLOWCONTROL warning: macro refresh deferred; validating cached macro status"
          fi

          for route in health release-manifest readiness probe-matrix cognitive-status research-status official-source-status macro-event-status; do
            request_json \
              "${route} verification" \
              "GET" \
              "/api/${route}" \
              ".flowcontrol/${route}.json" \
              "45" \
              "200"
          done

          request_json \
            "quick delta final status" \
            "GET" \
            "/api/quick-delta-refresh?action=STATUS" \
            ".flowcontrol/quick.json" \
            "45" \
            "200"

          request_json \
            "opportunity queue final status" \
            "GET" \
            "/api/opportunity-queue?action=STATUS" \
            ".flowcontrol/opportunity.json" \
            "45" \
            "200"

          if [ "${PERFORM_OPENAI_LIVE_CHECK}" = "true" ]; then
            request_json \
              "OpenAI live acceptance check" \
              "POST" \
              "/api/omni-openai-live-check" \
              ".flowcontrol/openai-live.json" \
              "90" \
              "200" \
              "AUTH" \
              '{"action":"LIVE_CHECK","decision_id":"scheduler-v1.6.4-live-check"}'
          else
            printf '%s\n' '{"skipped":true}' > .flowcontrol/openai-live.json
          fi

          node <<'NODE'
          const fs=require('node:fs');
          const j=p=>JSON.parse(fs.readFileSync(p,'utf8'));
          const expected=j('EXPECTED_RELEASE.json'),
                health=j('.flowcontrol/health.json'),
                manifest=j('.flowcontrol/release-manifest.json'),
                readiness=j('.flowcontrol/readiness.json'),
                probe=j('.flowcontrol/probe-matrix.json'),
                quick=j('.flowcontrol/quick.json'),
                opportunity=j('.flowcontrol/opportunity.json'),
                official=j('.flowcontrol/official-source-status.json'),
                macro=j('.flowcontrol/macro-event-status.json'),
                live=j('.flowcontrol/openai-live.json');

          const fail=(m,d={})=>{
            console.error(`FLOWCONTROL scheduler verification FAILED: ${m}`);
            console.error(JSON.stringify(d,null,2));
            process.exit(1);
          };
          const same=(a,b)=>Array.isArray(a)&&a.length===b.length&&a.every((v,i)=>v===b[i]);

          if(health.ok!==true||health.status!=='ALIVE')fail('health',{health});
          if(health.gateway_version!==expected.gateway_version||health.strategy_contract_version!==expected.strategy_contract_version)fail('release version',{health,expected});
          if(health.universe_fingerprint!==expected.universe_fingerprint||Number(health.declared_market_count)!==expected.declared_markets.length)fail('universe',{health});
          if(Number(health.declared_tool_probe_count)!==expected.declared_tool_probe_count||Number(health.declared_feed_identifier_count)!==expected.declared_feed_identifier_count)fail('capacity contract',{health});
          if(health.feed_auth_mode!==expected.feed_auth_mode)fail('feed mode',{actual:health.feed_auth_mode,expected:expected.feed_auth_mode});
          if(manifest.gateway_version!==expected.gateway_version||manifest.strategy_contract_version!==expected.strategy_contract_version||manifest.universe_fingerprint!==expected.universe_fingerprint||!same(manifest.declared_markets,expected.declared_markets))fail('manifest',{manifest});
          if(readiness.internal_contract_sync!==true||(Array.isArray(readiness.critical_blockers)&&readiness.critical_blockers.length))fail('readiness',{readiness});
          if(Number(probe.tool_declaration_count??probe.tool_declarations)!==expected.declared_tool_probe_count)fail('probe tools',{probe});
          if(Number(probe.feed_identifier_count??probe.feed_identifiers)!==expected.declared_feed_identifier_count)fail('probe feeds',{probe});

          const markets=Array.isArray(quick.signals)?quick.signals.map(x=>x.market):[];
          if(quick.ok!==true||Number(quick.market_count)!==expected.declared_markets.length||Number(quick.age_sec)>expected.quick_delta_max_age_sec)fail('quick delta',{quick});
          if(expected.declared_markets.some(x=>!markets.includes(x)))fail('quick coverage',{markets});
          if(opportunity.ok!==true||Number(opportunity.market_count)!==expected.declared_markets.length||Number(opportunity.age_sec)>expected.opportunity_queue_max_age_sec)fail('opportunity',{opportunity});
          if(Number(official.direct?.refresh_age_sec)>expected.official_source_max_age_sec)fail('official source age',{official:official.direct});
          if(macro.ok!==true)fail('macro status',{macro});
          if(live.skipped!==true&&(live.ok!==true||live.live_response_verified!==true||!live.model||!live.response_id))fail('OpenAI live acceptance',{live});

          console.log(JSON.stringify({
            result:'FLOWCONTROL scheduler verification PASS',
            scheduler_version:expected.scheduler_version,
            gateway_version:health.gateway_version,
            strategy_contract_version:health.strategy_contract_version,
            market_count:quick.market_count,
            tool_count:health.declared_tool_probe_count,
            feed_identifier_count:health.declared_feed_identifier_count,
            feed_auth_mode:health.feed_auth_mode,
            quick_delta_age_sec:quick.age_sec,
            opportunity_age_sec:opportunity.age_sec,
            official_source_age_sec:official.direct?.refresh_age_sec,
            macro_due:macro.automatic_refresh?.due??macro.due,
            openai_live_check_ran:live.skipped!==true,
            openai_live_verified:live.live_response_verified===true,
            openai_model:live.model||null
          },null,2));
          NODE
