name: FLOWCONTROL Full-Capacity Intelligence Refresh v1.6.1

on:
  schedule:
    - cron: "2-57/5 * * * *"
  workflow_dispatch:
    inputs:
      perform_openai_live_check:
        description: "Perform one real OpenAI Responses API acceptance check"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: flowcontrol-full-capacity-production
  cancel-in-progress: false

jobs:
  refresh-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FLOWCONTROL_GATEWAY_URL: ${{ secrets.FLOWCONTROL_GATEWAY_URL }}
      FLOWCONTROL_GATEWAY_TOKEN: ${{ secrets.FLOWCONTROL_GATEWAY_TOKEN }}
      PERFORM_OPENAI_LIVE_CHECK: ${{ inputs.perform_openai_live_check || false }}
    steps:
      - name: Check out scheduler contract
        uses: actions/checkout@v4

      - name: Refresh intelligence and verify release
        shell: bash
        run: |
          set -euo pipefail
          test -n "${FLOWCONTROL_GATEWAY_URL:-}"
          test -n "${FLOWCONTROL_GATEWAY_TOKEN:-}"
          BASE_URL="${FLOWCONTROL_GATEWAY_URL%/}"
          mkdir -p .flowcontrol

          curl -sSLo .flowcontrol/opportunity-before.json --fail --connect-timeout 15 --max-time 45 "${BASE_URL}/api/opportunity-queue?action=STATUS"
          opportunity_age="$(node -e "const x=require('./.flowcontrol/opportunity-before.json'); console.log(Number(x.age_sec ?? -1))")"
          if [ "$opportunity_age" -lt 0 ] || [ "$opportunity_age" -gt 600 ]; then
            code="$(curl -sSL --connect-timeout 15 --max-time 240 --retry 2 --retry-delay 3 --retry-all-errors -o .flowcontrol/opportunity-refresh.json -w '%{http_code}' -X POST "${BASE_URL}/api/opportunity-queue" -H "Authorization: Bearer ${FLOWCONTROL_GATEWAY_TOKEN}" -H 'Content-Type: application/json' --data '{"action":"REFRESH","reason":"github_scheduler_v1.6.1"}')"
            if [ "$code" = "409" ]; then sleep 12; else test "$code" = "200"; fi
          fi

          quick_code="$(curl -sSL --connect-timeout 15 --max-time 210 --retry 2 --retry-delay 3 --retry-all-errors -o .flowcontrol/quick-refresh.json -w '%{http_code}' -X POST "${BASE_URL}/api/quick-delta-refresh" -H "Authorization: Bearer ${FLOWCONTROL_GATEWAY_TOKEN}" -H 'Content-Type: application/json' --data '{"action":"REFRESH","reason":"github_scheduler_v1.6.1"}')"
          if [ "$quick_code" = "409" ]; then sleep 12; else test "$quick_code" = "200"; fi

          curl -sSLo .flowcontrol/official-status.json --fail --connect-timeout 15 --max-time 45 "${BASE_URL}/api/official-source-status"
          official_age="$(node -e "const x=require('./.flowcontrol/official-status.json'); console.log(Number(x.direct?.refresh_age_sec ?? -1))")"
          if [ "$official_age" -lt 0 ] || [ "$official_age" -gt 1800 ]; then
            curl -sSLo .flowcontrol/official-refresh.json --fail --connect-timeout 15 --max-time 240 -X POST "${BASE_URL}/api/official-source-refresh" -H "Authorization: Bearer ${FLOWCONTROL_GATEWAY_TOKEN}" -H 'Content-Type: application/json' --data '{"include_search":false,"reason":"github_scheduler_v1.6.1_direct"}'
          fi

          curl -sSLo .flowcontrol/macro-refresh.json --fail --connect-timeout 15 --max-time 240 "${BASE_URL}/api/macro-event-refresh"

          for route in health release-manifest readiness probe-matrix cognitive-status research-status official-source-status macro-event-status; do
            curl -sSLo ".flowcontrol/${route}.json" --fail --connect-timeout 15 --max-time 45 "${BASE_URL}/api/${route}"
          done
          curl -sSLo .flowcontrol/quick.json --fail --connect-timeout 15 --max-time 45 "${BASE_URL}/api/quick-delta-refresh?action=STATUS"
          curl -sSLo .flowcontrol/opportunity.json --fail --connect-timeout 15 --max-time 45 "${BASE_URL}/api/opportunity-queue?action=STATUS"

          if [ "${PERFORM_OPENAI_LIVE_CHECK}" = "true" ]; then
            curl -sSLo .flowcontrol/openai-live.json --fail --connect-timeout 15 --max-time 90 -X POST "${BASE_URL}/api/omni-openai-live-check" -H "Authorization: Bearer ${FLOWCONTROL_GATEWAY_TOKEN}" -H 'Content-Type: application/json' --data '{"action":"LIVE_CHECK","decision_id":"scheduler-v1.6.1-live-check"}'
          else
            printf '%s\n' '{"skipped":true}' > .flowcontrol/openai-live.json
          fi

          node <<'NODE'
          const fs=require('node:fs');
          const j=p=>JSON.parse(fs.readFileSync(p,'utf8'));
          const expected=j('EXPECTED_RELEASE.json'),health=j('.flowcontrol/health.json'),manifest=j('.flowcontrol/release-manifest.json'),readiness=j('.flowcontrol/readiness.json'),probe=j('.flowcontrol/probe-matrix.json'),quick=j('.flowcontrol/quick.json'),opportunity=j('.flowcontrol/opportunity.json'),official=j('.flowcontrol/official-source-status.json'),macro=j('.flowcontrol/macro-event-status.json'),live=j('.flowcontrol/openai-live.json');
          const fail=(m,d={})=>{console.error(`FLOWCONTROL scheduler verification FAILED: ${m}`);console.error(JSON.stringify(d,null,2));process.exit(1);};
          const same=(a,b)=>Array.isArray(a)&&a.length===b.length&&a.every((v,i)=>v===b[i]);
          if(health.ok!==true||health.status!=='ALIVE')fail('health',{health});
          if(health.gateway_version!==expected.gateway_version||health.strategy_contract_version!==expected.strategy_contract_version)fail('release version',{health,expected});
          if(health.universe_fingerprint!==expected.universe_fingerprint||Number(health.declared_market_count)!==expected.declared_markets.length)fail('universe',{health});
          if(Number(health.declared_tool_probe_count)!==expected.declared_tool_probe_count||Number(health.declared_feed_identifier_count)!==expected.declared_feed_identifier_count)fail('capacity contract',{health});
          if(health.feed_auth_mode!=='PUBLIC_NUMERIC_ADVISORY')fail('feed mode',{actual:health.feed_auth_mode});
          if(manifest.gateway_version!==expected.gateway_version||manifest.strategy_contract_version!==expected.strategy_contract_version||manifest.universe_fingerprint!==expected.universe_fingerprint||!same(manifest.declared_markets,expected.declared_markets))fail('manifest',{manifest});
          if(readiness.internal_contract_sync!==true||Array.isArray(readiness.critical_blockers)&&readiness.critical_blockers.length)fail('readiness',{readiness});
          if(Number(probe.tool_declaration_count??probe.tool_declarations)!==expected.declared_tool_probe_count)fail('probe tools',{probe});
          if(Number(probe.feed_identifier_count??probe.feed_identifiers)!==expected.declared_feed_identifier_count)fail('probe feeds',{probe});
          const markets=Array.isArray(quick.signals)?quick.signals.map(x=>x.market):[];
          if(quick.ok!==true||Number(quick.market_count)!==expected.declared_markets.length||Number(quick.age_sec)>expected.quick_delta_max_age_sec)fail('quick delta',{quick});
          if(expected.declared_markets.some(x=>!markets.includes(x)))fail('quick coverage',{markets});
          if(opportunity.ok!==true||Number(opportunity.market_count)!==expected.declared_markets.length||Number(opportunity.age_sec)>expected.opportunity_queue_max_age_sec)fail('opportunity',{opportunity});
          if(Number(official.direct?.refresh_age_sec)>expected.official_source_max_age_sec)fail('official source age',{official:official.direct});
          if(macro.ok!==true)fail('macro status',{macro});
          if(live.skipped!==true&&(live.ok!==true||live.live_response_verified!==true||!live.model||!live.response_id))fail('OpenAI live acceptance',{live});
          console.log(JSON.stringify({result:'FLOWCONTROL scheduler verification PASS',scheduler_version:expected.scheduler_version,gateway_version:health.gateway_version,strategy_contract_version:health.strategy_contract_version,market_count:quick.market_count,tool_count:health.declared_tool_probe_count,feed_identifier_count:health.declared_feed_identifier_count,quick_delta_age_sec:quick.age_sec,opportunity_age_sec:opportunity.age_sec,official_source_age_sec:official.direct?.refresh_age_sec,macro_due:macro.automatic_refresh?.due??macro.due,openai_live_check_ran:live.skipped!==true,openai_live_verified:live.live_response_verified===true,openai_model:live.model||null},null,2));
          NODE
