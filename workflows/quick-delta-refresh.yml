name: FLOWCONTROL Five-Minute Quick Delta

on:
  schedule:
    - cron: "2-57/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flowcontrol-five-minute-quick-delta
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh Quick delta
        env:
          GATEWAY_URL: ${{ secrets.FLOWCONTROL_GATEWAY_URL }}
          GATEWAY_TOKEN: ${{ secrets.FLOWCONTROL_GATEWAY_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$GATEWAY_URL" && test -n "$GATEWAY_TOKEN"
          response="$(curl --fail --silent --show-error --max-time 110 \
            --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer $GATEWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"action":"REFRESH","reason":"public_github_scheduler_5m"}' \
            "$GATEWAY_URL/api/quick-delta-refresh")"
          printf '%s\n' "$response"
          node -e '
            const r=JSON.parse(process.argv[1]);
            if(r.ok!==true) throw new Error(`quick refresh failed: ${r.error||r.status||"unknown"}`);
            if(Number(r.market_count||0)!==20) throw new Error(`quick market coverage ${r.market_count||0}/20`);
          ' "$response"

      - name: Verify Quick readiness
        env:
          GATEWAY_URL: ${{ secrets.FLOWCONTROL_GATEWAY_URL }}
        run: |
          set -euo pipefail
          readiness="$(curl --fail --silent --show-error --max-time 30 \
            "$GATEWAY_URL/api/readiness")"
          printf '%s\n' "$readiness"
          node -e '
            const r=JSON.parse(process.argv[1]);
            if(r.internal_contract_sync!==true) throw new Error("release contract mismatch");
            if(r.quick_delta?.ok!==true) throw new Error("Quick delta unavailable");
            if(Number(r.quick_delta?.freshness_score||0)<0.67) throw new Error("Quick delta not fresh");
            if(Number(r.quick_delta?.market_count||0)!==20) throw new Error("Quick universe incomplete");
          ' "$readiness"
